name: Build Rust

on:
  push:
    branches: [rust-migration]
  pull_request:
    branches: [rust-migration]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Build
        run: cargo build --workspace --all-targets
      - name: Unit tests
        run: cargo test --workspace

  # Parity smoke test: run the functional suite against the Rust binary. The interpreter is
  # still a stub, so this is allowed to fail for now; flip continue-on-error off once the
  # corresponding milestone lands and the gated subset is expected to pass.
  functional-parity:
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build Rust ngless
        run: cargo build --release
      - name: Run functional tests against the Rust binary
        run: NGLESS_BIN="$PWD/target/release/ngless" ./run-tests.sh
